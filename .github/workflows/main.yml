name: 24/7 Controlled Stream (Max 11h 50m)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_stream]

concurrency:
  group: stream-group
  cancel-in-progress: false

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 355 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Start Loop Stream
        env:
          S1: ${{ secrets.STREAM_1_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          EVENT_TYPE: ${{ github.event_name == 'repository_dispatch' && 'restart' || 'initial' }}
        run: |
          # Timer Handler: Round 1 (5h 50m) ke baad Round 2 trigger karega
          trigger_handler() {
            echo "Timer started for 5 hours 50 minutes..."
            sleep 21000 
            
            if [ "$EVENT_TYPE" == "initial" ]; then
              echo "First cycle complete. Triggering final round..."
              curl -X POST -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/dispatches \
              -d '{"event_type": "restart_stream"}'
            else
              echo "Second cycle complete. Stopping forever."
            fi
            
            touch stop_signal.txt
            pkill ffmpeg
          }

          trigger_handler &

          # Main Streaming Loop
          while true; do
            if [ -f "stop_signal.txt" ]; then
               echo "Limit reached. Stream terminated."
               exit 0
            fi

            # Slow Left-Right Pan Effect
            # 'on/300' control karta hai speed ko (jitna bada number, utni dheeri movement)
            ffmpeg -loop 1 -i photo.jpg -stream_loop -1 -i audio.mp3 \
            -filter_complex \
            "[0:v]scale=1400:800,zoompan=z=1:x='(iw-1280)/2+((iw-1280)/2)*sin(on/300)':y='(ih-720)/2':s=1280x720:fps=30[v]" \
            -map "[v]" -map 1:a:0 -c:v libx264 -preset superfast -tune zerolatency \
            -g 60 -keyint_min 60 -sc_threshold 0 \
            -pix_fmt yuv420p -b:v 2500k -maxrate 2500k -bufsize 5000k \
            -c:a aac -b:a 128k -ar 44100 -shortest \
            -f flv "$S1" || echo "FFmpeg restart..."

            sleep 5
          done
          
