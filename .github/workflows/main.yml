name: 24/7 Persistent Dual Stream (6h Auto-Restart)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_stream]

jobs:
  stream:
    runs-on: ubuntu-latest
    # Timeout ko 360 (6h) rakha hai taaki workflow safely finish ho sake
    timeout-minutes: 360 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Start Dual Loop Stream
        env:
          S1: ${{ secrets.STREAM_1_URL }}
          S2: ${{ secrets.STREAM_2_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          run_ffmpeg() {
            local STREAM_URL=$1
            ffmpeg -re -stream_loop -1 -i video.mp4 -stream_loop -1 -i audio.mp3 \
            -map 0:v:0 -map 1:a:0 -c:v libx264 -preset superfast -tune zerolatency \
            -g 60 -keyint_min 60 -sc_threshold 0 \
            -pix_fmt yuv420p -b:v 2500k -maxrate 2500k -bufsize 5000k \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv "$STREAM_URL"
          }

          run_ffmpeg "$S1" &
          run_ffmpeg "$S2" &
          
          # 5 Ghante 50 Minute wait karega (350 minutes)
          sleep 350m 
          
          # Sirf tabhi restart trigger karega agar ye 'workflow_dispatch' se start hua ho
          # Agar ye 'repository_dispatch' (restart wala) hai, toh ye dobara trigger nahi karega
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "First 6h cycle complete. Triggering one-time restart..."
            curl -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart_stream"}'
          else
            echo "Second cycle complete (Total ~12h). Stopping stream now."
          fi
          
          sleep 30s
          pkill ffmpeg
          exit 0
          
