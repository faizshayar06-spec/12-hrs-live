name: 24/7 Persistent Stream (Auto-Reconnect)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_stream]

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Start Single Loop Stream
        env:
          S1: ${{ secrets.STREAM_1_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Manual stop ke liye trap
          stop_all() {
            echo "Stopping stream..."
            pkill -P $$
            exit 0
          }
          trap stop_all SIGINT SIGTERM

          echo "Starting Stable 24/7 Stream..."
          
          # Infinite loop jo connection tootne par auto-restart karega
          while true; do
            ffmpeg -re -stream_loop -1 -i video.mp4 -stream_loop -1 -i audio.mp3 \
              -map 0:v:0 -map 1:a:0 -c:v libx264 -preset ultrafast -tune zerolatency \
              -g 60 -keyint_min 60 -sc_threshold 0 \
              -pix_fmt yuv420p -b:v 2500k -maxrate 2500k -bufsize 5000k \
              -c:a aac -b:a 128k -ar 44100 -strict experimental \
              -f flv "$S1" || echo "Stream dropped. Reconnecting in 5 seconds..."
            
            sleep 5
          done &
          
          # 5 ghante 45 minute baad agla workflow trigger hoga
          sleep 345m 
          
          echo "Triggering next workflow cycle..."
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{"event_type": "restart_stream"}'
          
          # Transition gap ke liye 1 minute ka buffer
          sleep 60s
          pkill ffmpeg
          exit 0
          
