name: 24/7 Controlled Stream (Max 11h 50m)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_stream]

concurrency:
  group: stream-group
  cancel-in-progress: false # Isko false rakhein taaki handoff smooth ho

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 355 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Start Loop Stream
        env:
          S1: ${{ secrets.STREAM_1_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          # Check karein ki ye manual start hai ya restart trigger
          EVENT_TYPE: ${{ github.event_name == 'repository_dispatch' && 'restart' || 'initial' }}
        run: |
          trigger_handler() {
            echo "Timer started for 5 hours 50 minutes..."
            sleep 21000 
            
            if [ "$EVENT_TYPE" == "initial" ]; then
              echo "First cycle complete. Triggering final round..."
              curl -X POST -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/dispatches \
              -d '{"event_type": "restart_stream"}'
            else
              echo "Second cycle (strictly 11:40h+) complete. Stopping forever."
            fi
            
            touch stop_signal.txt
            pkill ffmpeg
          }

          trigger_handler &

          while true; do
            if [ -f "stop_signal.txt" ]; then
               echo "Limit reached. Stream terminated."
               exit 0
            fi

            ffmpeg -re -stream_loop -1 -i video.mp4 -stream_loop -1 -i audio.mp3 \
            -map 0:v:0 -map 1:a:0 -c:v libx264 -preset superfast -tune zerolatency \
            -g 60 -keyint_min 60 -sc_threshold 0 \
            -pix_fmt yuv420p -b:v 2500k -maxrate 2500k -bufsize 5000k \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv "$S1" || echo "FFmpeg restart..."

            sleep 5
          done
          
